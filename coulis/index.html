<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoria — Portfólio Artesanal</title>
<style>
@import url('https://api.fontshare.com/v2/css?f[]=gambetta@300,400,600,300i,400i&f[]=satoshi@300,400,500&display=swap');

:root {
  --bg:           #F2F5F0;
  --bg-surface:   #FFFFFF;
  --bg-surface-2: #F7FAF6;

  --text-primary:   #1C2B1A;
  --text-secondary: rgba(28,43,26,0.65);
  --text-muted:     rgba(28,43,26,0.52);
  --text-hint:      rgba(28,43,26,0.50);

  --border-default: rgba(28,43,26,0.10);
  --border-subtle:  rgba(28,43,26,0.06);
  --border-hover:   rgba(28,43,26,0.22);

  /* Acento — preenchido via JS conforme a categoria detectada */
  --accent:        #A07830;
  --accent-small:  #7A5A1E;
  --accent-border: rgba(160,120,48,0.22);
  --accent-bg:     rgba(160,120,48,0.07);
  --accent-mid:    #C9A84C;
  --accent-rgb:    160,120,48;
}

/* ── PALETAS LIGHT MODE POR CATEGORIA ── */
body[data-cat="licores"]     { --accent:#A07830; --accent-small:#7A5A1E; --accent-border:rgba(160,120,48,0.22); --accent-bg:rgba(160,120,48,0.07); --accent-mid:#C9A84C; --accent-rgb:160,120,48; }
body[data-cat="bitters"]     { --accent:#7A4020; --accent-small:#5C2E0E; --accent-border:rgba(122,64,32,0.22);  --accent-bg:rgba(122,64,32,0.07);  --accent-mid:#A0622A; --accent-rgb:122,64,32; }
body[data-cat="cordiais"]    { --accent:#9B4520; --accent-small:#6B2E10; --accent-border:rgba(155,69,32,0.22);  --accent-bg:rgba(155,69,32,0.07);  --accent-mid:#C4632A; --accent-rgb:155,69,32; }
body[data-cat="xaropes"]     { --accent:#3E7235; --accent-small:#2A5E22; --accent-border:rgba(62,114,53,0.22);  --accent-bg:rgba(62,114,53,0.07);  --accent-mid:#6A9E52; --accent-rgb:62,114,53; }
body[data-cat="coulis"]      { --accent:#762D22; --accent-small:#511C14; --accent-border:rgba(118,45,34,0.22);  --accent-bg:rgba(118,45,34,0.07);  --accent-mid:#B04A3A; --accent-rgb:118,45,34; }
body[data-cat="shrubs"]      { --accent:#785320; --accent-small:#523813; --accent-border:rgba(120,83,32,0.22);  --accent-bg:rgba(120,83,32,0.07);  --accent-mid:#9A6E30; --accent-rgb:120,83,32; }
body[data-cat="vermutes"]    { --accent:#6B2848; --accent-small:#4A1432; --accent-border:rgba(107,40,72,0.22);  --accent-bg:rgba(107,40,72,0.07);  --accent-mid:#8B3A5A; --accent-rgb:107,40,72; }
body[data-cat="fermentados"] { --accent:#4E6030; --accent-small:#2E4418; --accent-border:rgba(78,96,48,0.22);   --accent-bg:rgba(78,96,48,0.07);   --accent-mid:#7A8C5A; --accent-rgb:78,96,48; }
body[data-cat="extratos"]    { --accent:#4A3A6A; --accent-small:#2E2248; --accent-border:rgba(74,58,106,0.22);  --accent-bg:rgba(74,58,106,0.07);  --accent-mid:#6B5A8A; --accent-rgb:74,58,106; }
body[data-cat="espumas"]     { --accent:#3D505B; --accent-small:#26363F; --accent-border:rgba(61,80,91,0.22);   --accent-bg:rgba(61,80,91,0.07);   --accent-mid:#7A8E9A; --accent-rgb:61,80,91; }
body[data-cat="sodas"]       { --accent:#2A7A5A; --accent-small:#0E5A3C; --accent-border:rgba(42,122,90,0.22);  --accent-bg:rgba(42,122,90,0.07);  --accent-mid:#4A9A7A; --accent-rgb:42,122,90; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Satoshi', 'Helvetica Neue', sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-content { flex: 1; }

/* ── NAV ── */
nav {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.nav-brand { display: flex; align-items: baseline; gap: 12px; }

.nav-logo {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  text-decoration: none;
}

.nav-logo em { font-style: italic; color: var(--accent); }

.nav-tagline {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-hint);
}

.nav-links { display: flex; gap: 32px; }

.nav-link {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.nav-link:hover { color: var(--text-primary); font-weight: 500; }

/* ── BREADCRUMB ── */
.breadcrumb-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 40px 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
}

.breadcrumb a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.breadcrumb a:hover { color: var(--text-primary); }

.breadcrumb-sep { color: var(--text-hint); }

.breadcrumb-current {
  color: var(--accent-small);
  font-weight: 500;
}

/* ── CATEGORY HEADER ── */
.cat-header {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 40px 48px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 40px;
  border-bottom: 1px solid var(--border-default);
  animation: fadeUp 0.8s ease both;
}

.cat-accent-bar {
  width: 40px;
  height: 4px;
  background: var(--accent);
  border-radius: 2px;
  margin-bottom: 16px;
}

.cat-title {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.cat-header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.cat-count-num {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: 40px;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
}

.cat-count-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-hint);
}

/* ── GRID ── */
.grid-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 40px 80px;
  animation: fadeUp 0.8s 0.1s ease both;
}

.grid-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-hint);
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.grid-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-default);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── RECIPE CARD ── */
.recipe-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.recipe-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(28,43,26,0.08);
  border-color: var(--border-hover);
}

.recipe-card-accent {
  height: 4px;
  background: var(--accent);
  flex-shrink: 0;
}

.recipe-card-body {
  padding: 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.recipe-card-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-small);
}

.recipe-card-title {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: 20px;
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.recipe-card-title em { font-style: italic; }

.recipe-card-desc {
  font-size: 12px;
  font-weight: 300;
  color: var(--text-muted);
  line-height: 1.6;
  flex: 1;
}

.recipe-card-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-surface-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.recipe-card-meta {
  font-size: 11px;
  color: var(--text-hint);
}

.recipe-card-arrow {
  font-size: 14px;
  color: var(--accent);
  transition: transform 0.2s;
}

.recipe-card:hover .recipe-card-arrow {
  transform: translateX(3px);
}

/* ── FEATURED CARD ── */
.recipe-card.featured {
  grid-column: span 3;
  flex-direction: row;
  border-color: var(--accent-border);
}

.recipe-card.featured:hover {
  border-color: rgba(var(--accent-rgb),0.45);
}

.recipe-card.featured .recipe-card-accent {
  width: 6px;
  height: auto;
  flex-shrink: 0;
}

.recipe-card.featured .recipe-card-body {
  padding: 32px;
  flex: 1;
}

.recipe-card.featured .recipe-card-title {
  font-size: 28px;
}

.recipe-card.featured .recipe-card-desc {
  font-size: 13px;
  max-width: 520px;
}

.featured-stats {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px;
  border-left: 1px solid var(--border-subtle);
  background: var(--bg-surface-2);
  min-width: 200px;
  flex-shrink: 0;
}

.featured-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 16px;
}

.featured-arrow {
  display: flex;
  justify-content: flex-end;
  margin-top: 24px;
  font-size: 16px;
  color: var(--accent);
  transition: transform 0.2s;
}

.recipe-card.featured:hover .featured-arrow {
  transform: translateX(3px);
}

.featured-stat-val {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: 24px;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
}

.featured-stat-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-hint);
  margin-top: 4px;
}

.featured-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent-small);
  background: var(--accent-bg);
  border: 1px solid var(--accent-border);
  border-radius: 4px;
  padding: 4px 8px;
  margin-bottom: 12px;
  width: fit-content;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 48px 24px;
  text-align: center;
  background: var(--bg-surface);
  border: 1px dashed var(--border-default);
  border-radius: 12px;
  grid-column: 1 / -1;
}

.empty-state-text {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── LOADING ── */
.loading-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-hint);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  grid-column: 1 / -1;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border-default);
  padding-top: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-text {
  font-size: 11px;
  color: var(--text-hint);
  letter-spacing: 0.08em;
}

.footer-sig {
  font-family: 'Gambetta', 'Georgia', serif;
  font-size: 14px;
  font-style: italic;
  color: rgba(var(--accent-rgb),0.5);
}

/* ── ANIMATION ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  nav, .breadcrumb-wrap, .cat-header, .grid-wrap {
    padding-left: 20px;
    padding-right: 20px;
  }
  .cat-header { grid-template-columns: 1fr; gap: 16px; }
  .cat-header-right { align-items: flex-start; flex-direction: row; gap: 24px; }
  .grid { grid-template-columns: 1fr; }
  .recipe-card.featured { flex-direction: column; grid-column: span 1; }
  .recipe-card.featured .recipe-card-accent { width: 100%; height: 4px; }
  .featured-stats { border-left: none; border-top: 1px solid var(--border-subtle); flex-direction: row; flex-wrap: wrap; gap: 16px; min-width: unset; }
  .nav-tagline { display: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <a href="../" class="nav-logo">Alta <em>Coquetelaria</em></a>
    <div class="nav-tagline">Portfólio Artesanal</div>
  </div>
  <div class="nav-links">
    <a href="../" class="nav-link">Receitas</a>
  </div>
</nav>

<main class="main-content">

<div class="breadcrumb-wrap">
  <div class="breadcrumb">
    <a href="../">Início</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current" id="breadcrumb-current">—</span>
  </div>
</div>

<!-- CATEGORY HEADER -->
<div class="cat-header">
  <div class="cat-header-left">
    <div class="cat-accent-bar"></div>
    <h1 class="cat-title" id="cat-title">—</h1>
  </div>
  <div class="cat-header-right">
    <div class="cat-count-num" id="cat-count-num">0</div>
    <div class="cat-count-label" id="cat-count-label">Receitas</div>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid-section-label">Receitas</div>
  <div class="grid" id="grid">
    <div class="loading-state">Carregando receitas…</div>
  </div>

  <footer>
    <span class="footer-text" id="footer-text">Alta Coquetelaria Caseira</span>
    <span class="footer-sig">@seuOtto</span>
  </footer>
</div>

</main>

<script>
/* ============================================================
   INDEX GENÉRICO DE CATEGORIA
   Um arquivo, funciona em qualquer pasta.
   Detecta a categoria pelo segmento final da URL.
============================================================ */
(async function() {

  // 1. Detectar categoria pela URL
  // Ex: /coulis/ → "coulis"  |  /licores/index.html → "licores"
  const pathParts = window.location.pathname
    .split('/')
    .filter(p => p && p !== 'index.html');
  const catSlug = pathParts[pathParts.length - 1] || 'licores';

  document.body.setAttribute('data-cat', catSlug);

  // 2. Carregar receitas.json (na raiz do site)
  let data;
  try {
    const res = await fetch('../receitas.json', { cache: 'no-cache' });
    data = await res.json();
  } catch (err) {
    document.getElementById('grid').innerHTML =
      '<div class="empty-state"><div class="empty-state-text">Erro ao carregar catálogo. Tente recarregar a página.</div></div>';
    console.error('Erro ao carregar receitas.json:', err);
    return;
  }

  // 3. Encontrar metadata da categoria
  const catInfo = data.categorias.find(c => c.slug === catSlug);
  if (!catInfo) {
    document.getElementById('grid').innerHTML =
      '<div class="empty-state"><div class="empty-state-text">Categoria não encontrada no catálogo.</div></div>';
    return;
  }

  // 4. Preencher header com dados da categoria
  document.title = `${catInfo.nome} — Portfólio Artesanal`;
  document.getElementById('breadcrumb-current').textContent = catInfo.nome;
  document.getElementById('cat-title').textContent = catInfo.nome;
  document.getElementById('footer-text').textContent =
    `Alta Coquetelaria Caseira · ${catInfo.nome}`;

  // 5. Filtrar receitas desta categoria
  const receitasCat = data.receitas.filter(r => r.categoria === catSlug);
  const count = receitasCat.length;
  document.getElementById('cat-count-num').textContent = count;
  document.getElementById('cat-count-label').textContent =
    count === 1 ? 'Receita' : 'Receitas';

  // 6. Empty state se não houver receita
  if (count === 0) {
    document.getElementById('grid').innerHTML =
      '<div class="empty-state"><div class="empty-state-text">Nenhuma receita publicada ainda nesta categoria.</div></div>';
    return;
  }

  // 7. Buscar metadados de cada receita (fetch do HTML + parse das <meta>)
  const receitasComMeta = await Promise.all(
    receitasCat.map(async (r) => {
      try {
        const res = await fetch(`${r.slug}.html`, { cache: 'no-cache' });
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const getMeta = (name) => {
          const el = doc.querySelector(`meta[name="${name}"]`);
          return el ? el.getAttribute('content') : '';
        };
        return {
          ...r,
          nome:       getMeta('receita-nome'),
          subtitulo:  getMeta('receita-subtitulo'),
          descricao:  getMeta('receita-descricao'),
          rendimento: getMeta('receita-rendimento'),
          abv:        getMeta('receita-abv'),
          stat1v:     getMeta('receita-stat1-valor'),
          stat1l:     getMeta('receita-stat1-label'),
          stat2v:     getMeta('receita-stat2-valor'),
          stat2l:     getMeta('receita-stat2-label'),
          stat3v:     getMeta('receita-stat3-valor'),
          stat3l:     getMeta('receita-stat3-label'),
          stat4v:     getMeta('receita-stat4-valor'),
          stat4l:     getMeta('receita-stat4-label'),
        };
      } catch (err) {
        console.error(`Erro ao carregar ${r.slug}.html:`, err);
        return { ...r, nome: r.slug, subtitulo: '', descricao: '', _erro: true };
      }
    })
  );

  // 8. Ordenar: destaque primeiro, depois resto (ordem original do JSON)
  receitasComMeta.sort((a, b) => (b.destaque ? 1 : 0) - (a.destaque ? 1 : 0));

  // 9. Renderizar cards
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  receitasComMeta.forEach((r) => {
    // Título com itálico na última palavra (convenção visual do portfólio)
    const tituloHTML = formatarTitulo(r.nome || r.slug);

    // Label do card: "Categoria · Subtítulo"
    const labelTxt = r.subtitulo
      ? `${catInfo.nome.replace(/ e .+$/, '')} · ${r.subtitulo}`
      : catInfo.nome;

    // Stats para card featured (usa até 4 stats da receita)
    const stats = [];
    if (r.stat1v) stats.push({ v: r.stat1v, l: r.stat1l });
    if (r.stat2v) stats.push({ v: r.stat2v, l: r.stat2l });
    if (r.stat3v) stats.push({ v: r.stat3v, l: r.stat3l });
    if (r.stat4v) stats.push({ v: r.stat4v, l: r.stat4l });

    const card = document.createElement('a');
    card.href = `${r.slug}.html`;

    if (r.destaque) {
      // ── CARD FEATURED ──
      card.className = 'recipe-card featured';
      card.innerHTML = `
        <div class="recipe-card-accent"></div>
        <div class="recipe-card-body">
          <div class="featured-badge">✦ Destaque</div>
          <div class="recipe-card-label">${escapeHtml(labelTxt)}</div>
          <div class="recipe-card-title">${tituloHTML}</div>
          <div class="recipe-card-desc">${escapeHtml(r.descricao || '')}</div>
        </div>
        <div class="featured-stats">
          <div class="featured-stats-grid">
            ${stats.slice(0, 4).map(s => `
              <div>
                <div class="featured-stat-val">${escapeHtml(s.v)}</div>
                <div class="featured-stat-label">${escapeHtml(s.l)}</div>
              </div>
            `).join('')}
          </div>
          <div class="featured-arrow">→</div>
        </div>
      `;
    } else {
      // ── CARD NORMAL ──
      const metaFooter = r.rendimento
        ? `${r.rendimento}${r.abv && r.abv !== 'N/A' ? ' · ' + r.abv : ''}`
        : '';

      card.className = 'recipe-card';
      card.innerHTML = `
        <div class="recipe-card-accent"></div>
        <div class="recipe-card-body">
          <div class="recipe-card-label">${escapeHtml(labelTxt)}</div>
          <div class="recipe-card-title">${tituloHTML}</div>
          <div class="recipe-card-desc">${escapeHtml(r.descricao || '')}</div>
        </div>
        <div class="recipe-card-footer">
          <span class="recipe-card-meta">${escapeHtml(metaFooter)}</span>
          <span class="recipe-card-arrow">→</span>
        </div>
      `;
    }

    grid.appendChild(card);
  });

  // ─── Helpers ───
  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatarTitulo(nome) {
    // Coloca a última palavra em itálico (convenção do portfólio)
    const partes = nome.trim().split(' ');
    if (partes.length < 2) return escapeHtml(nome);
    const ultima = partes.pop();
    return `${escapeHtml(partes.join(' '))} <em>${escapeHtml(ultima)}</em>`;
  }

})();
</script>
